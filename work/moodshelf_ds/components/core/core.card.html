<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin:0; padding:24px; background:var(--surface-page); }
  .wrap { display:flex; flex-direction:column; gap:18px; }
  .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  .lab { width:100%; font:600 11px var(--font-sans); letter-spacing:.16em; text-transform:uppercase; color:var(--text-muted); margin-bottom:-4px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Button, IconButton, Input, Badge, Avatar, SegmentedControl, Icon } = window.MoodShelfDesignSystem_76979c;
  function Demo() {
    const [tab, setTab] = React.useState('Reading');
    return (
      <div className="wrap">
        <div className="row">
          <span className="lab">Buttons</span>
          <Button variant="primary" iconLeft={<Icon name="plus" size={18} />}>Add to shelf</Button>
          <Button variant="secondary" iconLeft={<Icon name="bookmark" size={18} />}>Want to read</Button>
          <Button variant="soft">Soft</Button>
          <Button variant="ghost">Skip</Button>
          <Button variant="danger">Set down</Button>
        </div>
        <div className="row">
          <span className="lab">Icon buttons · Segmented</span>
          <IconButton name="heart" variant="soft" active />
          <IconButton name="share" variant="soft" />
          <IconButton name="more-horizontal" variant="ghost" />
          <SegmentedControl options={['Reading','Finished','Want']} value={tab} onChange={setTab} />
        </div>
        <div className="row">
          <span className="lab">Fields</span>
          <div style={{flex:1, minWidth:200}}><Input variant="search" placeholder="Search your library…" /></div>
          <div style={{flex:1, minWidth:200}}><Input icon="feather" placeholder="Add a margin note" /></div>
        </div>
        <div className="row">
          <span className="lab">Status · Avatars</span>
          <Badge status="reading" />
          <Badge status="finished" />
          <Badge status="want" />
          <Badge status="favorite">Ruined me</Badge>
          <Avatar name="Wren Adler" />
          <Avatar name="June Okafor" />
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
