<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Shareable Story Card" description="A 9:16 MoodShelf share card for a book — Instagram / TikTok / Pinterest ready" -->
<helmet>
  <script src="./ds-base.js"></script>
</helmet>
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px;box-sizing:border-box;background:#1b140d;background-image:radial-gradient(120% 80% at 50% 0%, rgba(200,145,58,0.16), rgba(0,0,0,0) 60%);font-family:var(--font-sans);">
  <div style="width:360px;aspect-ratio:9 / 16;border-radius:26px;overflow:hidden;position:relative;box-shadow:0 40px 90px -24px rgba(0,0,0,0.7);background:#241712;background-image:linear-gradient(150deg, #6A4569 0%, #97433D 55%, #C8913A 115%);display:flex;flex-direction:column;padding:28px;box-sizing:border-box;">

    <!-- brand lockup -->
    <div style="display:flex;align-items:center;gap:9px;">
      <svg viewBox="0 0 64 64" width="24" height="24" fill="none" style="display:block;">
        <path d="M32 22.5C26 18.8 19.5 18.4 11.8 20.4C10.7 20.7 10 21.7 10 22.8V43.3C10 44.8 11.4 45.9 12.8 45.6C19.4 44.1 25.7 44.6 32 47.8" stroke="#FFF7E8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M32 22.5C38 18.8 44.5 18.4 52.2 20.4C53.3 20.7 54 21.7 54 22.8V43.3C54 44.8 52.6 45.9 51.2 45.6C44.6 44.1 38.3 44.6 32 47.8" stroke="#FFF7E8" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"></path>
        <path d="M32 23.5V47" stroke="#FFF7E8" stroke-width="2.6" stroke-linecap="round"></path>
        <path d="M32 6C32 6 27.5 10.2 27.5 13.4C27.5 15.9 29.5 17.6 32 17.6C34.5 17.6 36.5 15.9 36.5 13.4C36.5 10.2 32 6 32 6Z" fill="#FFD98A"></path>
      </svg>
      <span style="font-family:var(--font-display);font-weight:600;font-size:17px;color:#FFF7E8;letter-spacing:-0.01em;">MoodShelf</span>
    </div>

    <!-- centerpiece: the book -->
    <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;">
      <div style="width:150px;height:225px;border-radius:3px;box-shadow:-6px 10px 24px -6px rgba(20,10,4,0.55);background:#3B2D20;color:#EAD8B8;display:flex;flex-direction:column;justify-content:space-between;padding:17px;box-sizing:border-box;">
        <div style="width:30%;height:2px;background:#C8913A;"></div>
        <div style="font-family:var(--font-display);font-weight:600;font-size:23px;line-height:1.05;letter-spacing:-0.01em;">The Secret History</div>
        <div style="font-family:var(--font-sans);font-weight:600;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;opacity:0.82;">Donna Tartt</div>
      </div>

      <div style="text-align:center;">
        <div style="font-family:var(--font-serif);font-style:italic;font-size:19px;line-height:1.5;color:#FFF7E8;max-width:260px;">“It made me want to be cold and brilliant and doomed.”</div>
      </div>

      <!-- emotion tags -->
      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:280px;">
        <span style="font-family:var(--font-hand);font-weight:600;font-size:16px;line-height:1;padding:4px 13px;border-radius:999px;background:#3C4A5A;color:#E3E9EF;transform:rotate(-1deg);box-shadow:0 1px 2px rgba(58,40,20,0.2);">eerie</span>
        <span style="font-family:var(--font-hand);font-weight:600;font-size:16px;line-height:1;padding:4px 13px;border-radius:999px;background:#6A4569;color:#EFE3EE;transform:rotate(-1deg);box-shadow:0 1px 2px rgba(58,40,20,0.2);">longing</span>
        <span style="font-family:var(--font-hand);font-weight:600;font-size:16px;line-height:1;padding:4px 13px;border-radius:999px;background:#4E7C76;color:#E4F0EE;transform:rotate(-1deg);box-shadow:0 1px 2px rgba(58,40,20,0.2);">wonder</span>
      </div>
    </div>

    <!-- footer -->
    <div style="text-align:center;font-family:var(--font-hand);font-size:19px;color:#FFF7E8;">@wrenreads · it ruined me ♥</div>
  </div>
</div>

</x-dc>
</body>
</html>
