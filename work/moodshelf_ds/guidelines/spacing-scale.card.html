<!-- @dsCard group="Spacing" viewport="700x180" name="Spacing Scale" subtitle="4px base rhythm, generous & journal-like" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:24px 28px; background:var(--surface-page); font-family:var(--font-sans); }
  .row { display:flex; align-items:flex-end; gap:16px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:7px; }
  .bar { background:var(--wash-candle); border-radius:var(--radius-xs); width:26px; }
  .lab { font-size:10px; color:var(--text-muted); font-variant-numeric:tabular-nums; }
</style></head><body>
  <div class="row">
    <div class="item"><div class="bar" style="height:4px"></div><span class="lab">1·4</span></div>
    <div class="item"><div class="bar" style="height:8px"></div><span class="lab">2·8</span></div>
    <div class="item"><div class="bar" style="height:12px"></div><span class="lab">3·12</span></div>
    <div class="item"><div class="bar" style="height:16px"></div><span class="lab">4·16</span></div>
    <div class="item"><div class="bar" style="height:20px"></div><span class="lab">5·20</span></div>
    <div class="item"><div class="bar" style="height:24px"></div><span class="lab">6·24</span></div>
    <div class="item"><div class="bar" style="height:32px"></div><span class="lab">7·32</span></div>
    <div class="item"><div class="bar" style="height:40px"></div><span class="lab">8·40</span></div>
    <div class="item"><div class="bar" style="height:48px"></div><span class="lab">9·48</span></div>
    <div class="item"><div class="bar" style="height:64px"></div><span class="lab">10·64</span></div>
    <div class="item"><div class="bar" style="height:80px"></div><span class="lab">11·80</span></div>
  </div>
</body></html>
