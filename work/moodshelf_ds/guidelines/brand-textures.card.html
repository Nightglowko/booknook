<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px; background:var(--surface-page); font-family:var(--font-sans); }
  .grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  .tile { height:120px; border-radius:var(--radius-md); border:1px solid var(--border); display:flex; align-items:flex-end; padding:10px; }
  .lab { font-size:11px; font-weight:600; }
</style></head><body>
  <div class="grid">
    <div class="tile" style="background:var(--paper-50); background-image:var(--texture-paper)"><span class="lab" style="color:var(--text-muted)">paper grain</span></div>
    <div class="tile" style="background:var(--wash-candle)"><span class="lab" style="color:#2A1C05">candle wash</span></div>
    <div class="tile" style="background:var(--wash-dusk)"><span class="lab" style="color:#F2E7D0">dusk wash</span></div>
    <div class="tile" style="background:var(--wash-aura)"><span class="lab" style="color:#F4E6E2">aura wash</span></div>
  </div>
</body></html>
