<!-- @dsCard group="Colors" viewport="700x180" name="Accent — Candlelight Gold" subtitle="The single brand accent; oxblood for emphasis" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px; background:var(--surface-page); }
  .row { display:flex; gap:10px; }
  .sw { flex:1; height:108px; border-radius:var(--radius-md); display:flex; flex-direction:column; justify-content:flex-end; padding:10px; box-shadow:var(--shadow-xs); }
  .name { font-size:11px; font-weight:600; }
  .hex { font-size:11px; opacity:.7; font-variant-numeric:tabular-nums; }
</style></head><body>
  <div class="row">
    <div class="sw" style="background:var(--candle-700)"><span class="name" style="color:#F6E6C2">candle-700</span><span class="hex" style="color:#F6E6C2">#97681F</span></div>
    <div class="sw" style="background:var(--candle-600)"><span class="name" style="color:#F6E6C2">candle-600</span><span class="hex" style="color:#F6E6C2">#B07C2C</span></div>
    <div class="sw" style="background:var(--candle-500)"><span class="name" style="color:#2A1C05">candle-500 ★</span><span class="hex" style="color:#2A1C05">#C8913A</span></div>
    <div class="sw" style="background:var(--candle-400)"><span class="name" style="color:#2A1C05">candle-400</span><span class="hex" style="color:#2A1C05">#DCA94F</span></div>
    <div class="sw" style="background:var(--candle-300)"><span class="name" style="color:#2A1C05">candle-300</span><span class="hex" style="color:#2A1C05">#EAC480</span></div>
    <div class="sw" style="background:var(--oxblood-600)"><span class="name" style="color:#E6C9C2">oxblood-600</span><span class="hex" style="color:#E6C9C2">#7A2E2A</span></div>
  </div>
</body></html>
