<!-- @dsCard group="Type" viewport="700x260" name="Display — Cormorant Garamond" subtitle="Romantic high-contrast serif for titles & hero" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:26px 28px; background:var(--surface-page); }
  .d1 { font-family:var(--font-display); font-weight:600; font-size:54px; line-height:1.05; letter-spacing:-.02em; color:var(--text-strong); }
  .d1 em { font-style:italic; color:var(--accent-strong); }
  .d2 { font-family:var(--font-display); font-weight:500; font-size:30px; line-height:1.1; color:var(--text-body); margin-top:10px; }
  .meta { margin-top:14px; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-muted); }
</style></head><body>
  <div class="d1">The books that <em>destroyed</em> me</div>
  <div class="d2">A reading life, kept like a memory box</div>
  <div class="meta">Cormorant Garamond · 600 / 500 · italic for emphasis</div>
</body></html>
