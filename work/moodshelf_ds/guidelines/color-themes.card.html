<!-- @dsCard group="Colors" viewport="700x200" name="Library Themes" subtitle="Premium theme scopes — set data-theme on a container" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px; background:var(--surface-page); }
  .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; }
  .theme { border-radius:var(--radius-md); overflow:hidden; border:1px solid var(--border); }
  .swatchset { display:flex; height:54px; }
  .swatchset i { flex:1; }
  .body { padding:8px 10px; }
  .nm { font-family:var(--font-display); font-size:15px; font-weight:600; line-height:1.1; color:var(--text-strong); }
  .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:var(--accent); margin-right:5px; vertical-align:middle; }
  .tag { font-size:10px; color:var(--text-muted); }
</style></head><body>
  <div class="grid">
    <div class="theme" data-theme="dark-academia" style="background:var(--surface-page)"><div class="swatchset"><i style="background:var(--surface-card)"></i><i style="background:var(--accent)"></i><i style="background:var(--accent-ink)"></i></div><div class="body"><div class="nm"><span class="dot"></span>Dark Academia</div></div></div>
    <div class="theme" data-theme="cozy-cottage" style="background:var(--surface-page)"><div class="swatchset"><i style="background:var(--surface-card)"></i><i style="background:var(--accent)"></i><i style="background:var(--accent-ink)"></i></div><div class="body"><div class="nm"><span class="dot"></span>Cozy Cottage</div></div></div>
    <div class="theme" data-theme="gothic-romance" style="background:var(--surface-page)"><div class="swatchset"><i style="background:var(--surface-card)"></i><i style="background:var(--accent)"></i><i style="background:var(--accent-ink)"></i></div><div class="body"><div class="nm"><span class="dot"></span>Gothic Romance</div></div></div>
    <div class="theme" data-theme="japanese-minimal" style="background:var(--surface-page)"><div class="swatchset"><i style="background:var(--surface-card)"></i><i style="background:var(--accent)"></i><i style="background:var(--accent-ink)"></i></div><div class="body"><div class="nm"><span class="dot"></span>Japanese Minimal</div></div></div>
    <div class="theme" data-theme="witchy" style="background:var(--surface-page)"><div class="swatchset"><i style="background:var(--surface-card)"></i><i style="background:var(--accent)"></i><i style="background:var(--accent-ink)"></i></div><div class="body"><div class="nm"><span class="dot"></span>Witchy Room</div></div></div>
  </div>
</body></html>
