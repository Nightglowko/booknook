<!-- @dsCard group="Colors" viewport="700x220" name="Neutrals — Ink to Parchment" subtitle="Warm espresso through aged paper; never gray" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:22px; background:var(--surface-page); }
  .row { display:flex; gap:8px; }
  .sw { flex:1; height:96px; border-radius:var(--radius-sm); display:flex; flex-direction:column; justify-content:flex-end; padding:8px; }
  .b { border:1px solid var(--border); }
  .name { font-size:10px; font-weight:600; }
  .hex { font-size:10px; opacity:.7; font-variant-numeric:tabular-nums; }
</style></head><body>
  <div class="row">
    <div class="sw" style="background:var(--ink-900)"><span class="name" style="color:#F2E7D0">ink-900</span><span class="hex" style="color:#F2E7D0">#241A12</span></div>
    <div class="sw" style="background:var(--ink-700)"><span class="name" style="color:#F2E7D0">ink-700</span><span class="hex" style="color:#F2E7D0">#3B2D20</span></div>
    <div class="sw" style="background:var(--ink-500)"><span class="name" style="color:#F2E7D0">ink-500</span><span class="hex" style="color:#F2E7D0">#6B543E</span></div>
    <div class="sw" style="background:var(--clay-400)"><span class="name" style="color:#241A12">clay-400</span><span class="hex" style="color:#241A12">#8A6F52</span></div>
    <div class="sw" style="background:var(--sand-300)"><span class="name" style="color:#241A12">sand-300</span><span class="hex" style="color:#241A12">#B49A78</span></div>
    <div class="sw" style="background:var(--paper-200)"><span class="name" style="color:#3B2D20">paper-200</span><span class="hex" style="color:#3B2D20">#E7D8BE</span></div>
    <div class="sw b" style="background:var(--paper-50)"><span class="name" style="color:#3B2D20">paper-50</span><span class="hex" style="color:#3B2D20">#F8F1E2</span></div>
    <div class="sw b" style="background:var(--paper-0)"><span class="name" style="color:#3B2D20">paper-0</span><span class="hex" style="color:#3B2D20">#FFFCF4</span></div>
  </div>
</body></html>
