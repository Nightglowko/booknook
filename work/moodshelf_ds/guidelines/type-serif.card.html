<!-- @dsCard group="Type" viewport="700x240" name="Serif — Spectral" subtitle="Quotes, marginalia & editorial reading text" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:26px 28px; background:var(--surface-card); }
  .q { font-family:var(--font-serif); font-style:italic; font-weight:400; font-size:23px; line-height:1.6; color:var(--text-strong); max-width:34ch; }
  .q .mark { color:var(--accent); }
  .p { font-family:var(--font-serif); font-weight:400; font-size:15px; line-height:1.7; color:var(--text-body); max-width:54ch; margin-top:14px; }
  .meta { margin-top:14px; font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-muted); }
</style></head><body>
  <div class="q"><span class="mark">“</span>It was the closest thing to being held that a paragraph has ever managed.<span class="mark">”</span></div>
  <div class="p">Spectral carries longer passages — the quotes you save, the notes in the margin, the memory you attach to a chapter you'll never reread the same way.</div>
  <div class="meta">Spectral · 300 / 400 / 500 · italic</div>
</body></html>
