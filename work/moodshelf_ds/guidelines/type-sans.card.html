<!-- @dsCard group="Type" viewport="700x250" name="Sans — Hanken Grotesk" subtitle="All functional UI: labels, buttons, body, stats" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin:0; padding:24px 28px; background:var(--surface-page); font-family:var(--font-sans); display:flex; flex-direction:column; gap:10px; }
  .line { display:flex; align-items:baseline; gap:14px; }
  .spec { width:96px; font-size:10px; color:var(--text-muted); font-variant-numeric:tabular-nums; }
  .lg { font-size:18px; font-weight:500; color:var(--text-strong); }
  .base { font-size:16px; font-weight:400; color:var(--text-body); }
  .sm { font-size:14px; font-weight:500; color:var(--text-body); }
  .eye { font-size:11px; font-weight:600; letter-spacing:.18em; text-transform:uppercase; color:var(--text-muted); }
</style></head><body>
  <div class="line"><span class="spec">18 / 500</span><span class="lg">Add to your shelf</span></div>
  <div class="line"><span class="spec">16 / 400</span><span class="base">You've logged 47 books this year, and felt 9 distinct moods.</span></div>
  <div class="line"><span class="spec">14 / 500</span><span class="sm">Currently reading · 312 pages left</span></div>
  <div class="line"><span class="spec">11 / 600</span><span class="eye">Reading Aura · June</span></div>
</body></html>
